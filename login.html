<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#171d26">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Coup Master">
  <title>Entrar | Coup Master 3D</title>
  <link rel="icon" href="assets/img/logo/favicon-coup-master.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/img/logo/coup-master-512x512.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/online.css">
</head>

<body class="login-page">
  <main class="game-menu login-menu" aria-labelledby="loginTitle">
    <div class="menu-atmosphere" aria-hidden="true">
      <span class="menu-suit menu-suit-spade">♠</span>
      <span class="menu-suit menu-suit-diamond">♦</span>
      <span class="menu-suit menu-suit-club">♣</span>
    </div>

    <section class="menu-brand login-brand">
      <h1 id="loginTitle">Coup Master</h1>
    </section>

    <section class="login-controls" aria-label="Entrar no Coup Master">
      <div class="login-action-dock">
        <button id="googleLoginBtn" class="login-menu-button login-google-button" type="button">
          Entrar com Google
        </button>
        <button id="guestLoginBtn" class="login-menu-button login-guest-button" type="button">
          Entrar como visitante
        </button>
        <button class="login-menu-button login-install-button pwa-install-btn" type="button" data-pwa-install hidden>
          Instalar Coup Master
        </button>
      </div>

      <div class="login-feedback">
        <div id="loginStatus" class="login-status" role="status" aria-live="polite"></div>
        <p class="pwa-install-status" data-pwa-status role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script type="module" src="js/pwa.js"></script>
  <script type="module" src="js/firebase/login-page.js"></script>
</body>

</html>
