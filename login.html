<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Entrar | Coup Master 3D</title>
  <link rel="icon" href="assets/img/logo/favicon-coup-master.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/online.css">
</head>

<body>
  <main class="online-shell">
    <section class="online-panel" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Coup Master</h1>
      <!-- <p>Entre com sua conta Google para criar uma mesa online ou participar de uma sala.</p> -->
      <div class="login-title-spacer" aria-hidden="true"></div>

      <div class="online-actions">
        <button id="googleLoginBtn" class="primary-btn" type="button">Entrar com Google</button>
        <button id="guestLoginBtn" class="secondary-btn local-only" type="button" hidden>Entrar como visitante</button>
      </div>

      <div id="loginStatus" class="status-text" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="js/firebase/login-page.js"></script>
</body>

</html>
