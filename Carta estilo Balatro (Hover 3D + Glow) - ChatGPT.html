<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carta Balatro</title>

<style>
body {
    background: radial-gradient(circle at top, #1b1b1b, #0b0b0b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1200px;
    font-family: 'Arial', sans-serif;
}

.card {
    width: 220px;
    height: 330px;
    background: linear-gradient(145deg, #2a2a2a, #111);
    border-radius: 18px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    cursor: pointer;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,0.15),
        transparent 80%
    );
    opacity: 0;
    transition: opacity 0.2s;
}

.card:hover::before {
    opacity: 1;
}

.card-content {
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    background: #181818;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 16px;
    transform: translateZ(40px);
}

.card-title {
    font-size: 18px;
    font-weight: bold;
    color: #ffd86b;
}

.card-art {
    flex: 1;
    margin: 12px 0;
    border-radius: 8px;
    background: radial-gradient(circle, #ff6a00, #7a1e00);
}

.card-desc {
    font-size: 12px;
    color: #ccc;
    line-height: 1.4;
}
</style>
</head>

<body>

<div class="card" id="card">
    <div class="card-content">
        <div class="card-title">Coringa Ardiloso</div>
        <div class="card-art"></div>
        <div class="card-desc">
            Ganha bônus ao combinar cartas de mesmo naipe.
        </div>
    </div>
</div>

<script>
const card = document.getElementById('card');

card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = -(y - centerY) / 15;
    const rotateY = (x - centerX) / 15;

    card.style.transform = `
        rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
        scale(1.05)
    `;
    card.style.boxShadow = `
        ${-rotateY * 2}px ${rotateX * 2}px 50px rgba(255, 200, 80, 0.4)
    `;
});

card.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateX(0) rotateY(0) scale(1)';
    card.style.boxShadow = '0 20px 40px rgba(0,0,0,0.7)';
});
</script>

</body>
</html>
