<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Coup Master - Lobby</title>
    <link rel="shortcut icon" href="img/coup.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <link rel="preload" href="fonts/tilda-script-bold.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="css/lobby.css">
</head>

<body>

    <div class="lobby-box">
        <button id="communityBtn" class="communityBtn-lobby" title="Tutoriais e Apoio">
            <img src="img/info.svg" alt="Comunidade">
        </button>

        <h1>Coup Master</h1>

        <button id="google-login-btn">
            <img src="img/google.svg" alt="G" class="google-icon">
            <span>ENTRAR COM GOOGLE</span>
        </button>

        <div id="user-info">
            <img id="user-photo" src="" alt="Foto">

            <div class="welcome-text">
                BEM-VINDO,<br> <span id="user-name"></span>!
            </div>

            <button id="logout-btn" style="background: #ff3b3b; color: white; font-weight: bold;">SAIR</button>
        </div>

        <div id="room-actions" class="room-actions">
            <h2 style="margin-top: 0; margin-bottom: 15px;">Sala</h2>
            <input type="text" id="room-code-input" placeholder="CÓDIGO (EX: XJ94)">
            <button id="join-room-btn">ENTRAR NA SALA</button>
            <button id="create-room-btn">CRIAR NOVA SALA</button>
            <p class="muted">O código será gerado automaticamente.</p>
        </div>

    </div>



    <div id="communityModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <button id="closeCommunityBtn" class="close-btn">&times;</button>

            <h2 style="margin-bottom: 5px;">Aprenda & Apoie</h2>
            <p class="muted" style="margin-top: 0;">Domine o jogo e ajude o projeto!</p>

            <div class="video-container" style="margin: 15px 0; border-radius: 8px; overflow: hidden; border: 2px solid #ffffff22;">
                <iframe width="100%" height="215" src="https://www.youtube.com/embed/9iZ2sfepYWY?si=RzFeSeRFhcvabaW4"
                    title="Como Jogar Coup" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
                </iframe>
            </div>

            <div class="community-links" style="display: flex; flex-direction: column; gap: 10px;">
                <a href="https://patreon.com/gabrielbarbosa0" target="_blank" class="link-btn patreon"
                    style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <img src="img/patreon.svg" alt="Patreon" style="width: 20px; height: 20px; filter: brightness(0) invert(1);">
                    Apoie no Patreon
                </a>
            </div>
            <p class="muted" style="font-size: 10px; margin-top: 20px;">Beta v0.4 • Desenvolvido com ❤️</p>
        </div>
    </div>

    

    <script src="js/firebase.js" defer></script>
    <script src="js/lobby.js" defer></script>

</body>

<div id="font-loader" class="loader-overlay">
    <div class="loader-content">
        <h1>Coup Master</h1>
        <p>Carregando recursos...</p>
        <div class="spinner"></div>
    </div>
</div>

</html>
